<div class="app phase1-app">

<main><section id="weeklyListCard" class="weekly-list-card" hidden><div class="weekly-head"><div><small class="eyebrow">YOUR SHORTCUT</small><h2>Weekly grocery list</h2><p id="weeklyListMeta" class="muted"></p></div><span style="font-size:30px">↻</span></div><div class="weekly-actions"><button type="button" onclick="useWeeklyListFromHome()">Use this list</button><button class="secondary" type="button" onclick="clearWeeklyList()">Remove</button></div></section>
<section class="add-items-intro"><h1>Add Items</h1><p>Build your grocery list one item at a time.</p></section>
<div class="phase1-search-shell">
  <div class="search-wrap home-search-row"><input autocomplete="off" id="search" placeholder="Search for a product (e.g. milk, eggs)" type="search"/><button class="home-search-add hidden" id="searchAddButton" type="button">Add</button></div>
  <div id="message"></div><div id="results"></div><div id="quantityEditor"></div>
</div>

  <div class="section-label-row"><h2>Popular</h2><button type="button" id="viewAllCategories">View all categories</button></div>
  <div class="popular-grid" id="categoryGrid">
    <button class="popular-product category-chip active" data-category="all"><span class="category-line-icon"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="6" height="6" rx="1"/><rect x="14" y="4" width="6" height="6" rx="1"/><rect x="4" y="14" width="6" height="6" rx="1"/><rect x="14" y="14" width="6" height="6" rx="1"/></svg></span><span>All</span></button>
    <button class="popular-product category-chip" data-category="dairy"><span class="category-line-icon"><svg viewBox="0 0 24 24"><path d="M8 4h8l1 3v13H7V7z"/><path d="M8 8h9M10 4v3"/></svg></span><span>Dairy</span></button>
    <button class="popular-product category-chip" data-category="eggs"><span class="category-line-icon"><svg viewBox="0 0 24 24"><path d="M12 3c-3 4-5 7-5 11a5 5 0 0 0 10 0c0-4-2-7-5-11z"/></svg></span><span>Eggs</span></button>
    <button class="popular-product category-chip" data-category="bakery"><span class="category-line-icon"><svg viewBox="0 0 24 24"><path d="M5 17c0-5 3-9 7-9s7 4 7 9v2H5z"/><path d="M9 8c0-2 1-3 3-3M12 8c0-2 1-3 3-3"/></svg></span><span>Bakery</span></button>
    <button class="popular-product category-chip" data-category="meat"><span class="category-line-icon"><svg viewBox="0 0 24 24"><path d="M7 5c4-2 9 0 11 4s0 8-4 10-9 0-11-4 0-8 4-10z"/><circle cx="10" cy="12" r="2"/></svg></span><span>Meat &amp; Poultry</span></button>
    <button class="popular-product category-chip" data-category="fruits"><span class="category-line-icon"><svg viewBox="0 0 24 24"><path d="M12 8c-4-3-8 0-8 5 0 5 4 8 8 8s8-3 8-8c0-5-4-8-8-5z"/><path d="M12 8c0-3 2-5 5-5M12 7c-2-2-4-2-6-1"/></svg></span><span>Fruits</span></button>
    <button class="popular-product category-chip" data-category="vegetables"><span class="category-line-icon"><svg viewBox="0 0 24 24"><path d="M6 18c0-5 3-9 8-9 3 0 5 2 5 5 0 5-5 7-13 4z"/><path d="M14 9c0-3 2-5 5-6M10 10C8 7 6 6 4 6"/></svg></span><span>Vegetables</span></button>
    <button class="popular-product category-chip" data-category="pantry"><span class="category-line-icon"><svg viewBox="0 0 24 24"><path d="M8 4h8l1 3v13H7V7z"/><path d="M7 8h10M10 12h4"/></svg></span><span>Pantry</span></button>
    <button class="popular-product category-chip extra-category" data-category="frozen"><span class="category-line-icon"><svg viewBox="0 0 24 24"><path d="M12 3v18M4 8l16 8M4 16l16-8M8 4l4 4 4-4M8 20l4-4 4 4"/></svg></span><span>Frozen</span></button>
    <button class="popular-product category-chip extra-category" data-category="household"><span class="category-line-icon"><svg viewBox="0 0 24 24"><path d="M9 4h6v3l2 2v11H7V9l2-2z"/><path d="M9 12h6"/></svg></span><span>Household</span></button>
  </div>
</section>
<section class="phase1-list-preview">
  <div class="section-label-row"><h2>Your List</h2><a href="list.html">Edit</a></div>
  <div class="card list-summary"><div id="itemCountLabel">0 items on the list</div><a href="list.html">View list →</a></div>
</section>
<section class="card savings-summary hidden" id="homeSavings"><div class="muted">Saved this month</div><div class="price" id="homeSaved">$0.00</div><div class="mini-trend">Compared with regular store prices</div></section>

</div>

<script>
function renderHomeReceiptSummary(){let rs=[];try{rs=JSON.parse(localStorage.getItem('receipts')||'[]')}catch(_){rs=[]}const card=document.getElementById('homeSavings');if(!rs.length){card.classList.add('hidden');document.getElementById('homeSaved').textContent='$0.00';return;}card.classList.remove('hidden');const v=rs.reduce((s,r)=>s+Math.max(0,Number(r.regularPriceTotal||r.highestStoreTotal||r.totalSpent||0)-Number(r.totalSpent||0)),0);document.getElementById('homeSaved').textContent=money(v)}
renderHomeReceiptSummary();document.addEventListener('grocerysaver:receipts-updated',renderHomeReceiptSummary);document.addEventListener('grocerysaver:cloud-ready',renderHomeReceiptSummary);window.addEventListener('storage',renderHomeReceiptSummary);
(function(){const name=(localStorage.getItem('groceryProfileName')||localStorage.getItem('budgetProfileName')||localStorage.getItem('profileName')||'').trim();document.getElementById('homeGreeting').textContent=name?`Hi, ${name.split(/\s+/)[0]} 👋`:'Hi there 👋';const aliases={fruits:['fruit','apple','banana','orange','berry','mango','grape','produce'],vegetables:['vegetable','veggie','broccoli','tomato','potato','onion','carrot','lettuce','produce'],meat:['meat','poultry','chicken','beef','pork','seafood'],dairy:['dairy','milk','cheese','yogurt','cream','butter'],eggs:['egg'],bakery:['bakery','bread','bun','bagel','tortilla'],pantry:['pantry','grocery','rice','pasta','canned','snack','sauce','oil','flour','sugar'],frozen:['frozen'],household:['household','personal care','cleaning','paper','soap']};function categoryProducts(key){const products=typeof getProducts==='function'?getProducts():[];if(key==='all')return products;const words=aliases[key]||[key];return products.filter(p=>words.some(w=>`${p.category||''} ${p.name||''}`.toLowerCase().includes(w)))}function showCategory(key){document.querySelectorAll('.category-chip').forEach(b=>b.classList.toggle('active',b.dataset.category===key));const products=categoryProducts(key),search=document.getElementById('search');if(key==='all'){search.value='';renderProducts('');return;}const selections=[];const seen=new Set();products.forEach(p=>{const k=`${String(p.name).toLowerCase()}|${String(p.unit||'').toLowerCase()}`;if(!seen.has(k)){seen.add(k);selections.push({name:p.name,unit:p.unit||''})}});const results=document.getElementById('results');document.getElementById('quantityEditor').innerHTML='';results.innerHTML=selections.slice(0,12).map(s=>`<button type="button" class="phase1-search-result" onclick="selectHomeSearchResult('${encodeURIComponent(s.name)}','${encodeURIComponent(s.unit)}')"><span class="result-art">${productIcon(cheapestVariant(s.name,s.unit))}</span><span class="result-copy"><strong>${s.name}</strong><small>${s.unit||'Choose size'}</small></span><span class="result-chevron">›</span></button>`).join('')||'<div class="empty">No products in this category yet.</div>'}document.querySelectorAll('.category-chip').forEach(b=>b.addEventListener('click',()=>showCategory(b.dataset.category||'all')));const view=document.getElementById('viewAllCategories');let expanded=false;view.addEventListener('click',()=>{expanded=!expanded;document.getElementById('categoryGrid').classList.toggle('show-all',expanded);view.textContent=expanded?'Show popular':'View all categories';if(expanded)document.querySelector('.extra-category')?.scrollIntoView({behavior:'smooth',block:'nearest'});});})();</script>
<script>
(function(){const card=document.getElementById('weeklyListCard');const meta=document.getElementById('weeklyListMeta');const weekly=SulitLaunch.getWeeklyList();if(weekly.items?.length){card.hidden=false;const qty=weekly.items.reduce((n,x)=>n+Number(x.quantity||1),0);meta.textContent=`${qty} ${qty===1?'item':'items'} · ready to reuse`;}})();
function useWeeklyListFromHome(){const count=SulitLaunch.useWeeklyList();if(count){location.href='list.html'}}
function clearWeeklyList(){localStorage.removeItem('sulitWeeklyList');document.getElementById('weeklyListCard').hidden=true}
</script>
<script>if('serviceWorker' in navigator && !['localhost','127.0.0.1'].includes(location.hostname)){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}))}</script>
